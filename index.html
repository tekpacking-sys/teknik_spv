const setupAutocomplete = (input) => {

    let suggestionBox = document.createElement("div");

    suggestionBox.className = "custom-autocomplete-list";

    input.parentNode.appendChild(suggestionBox);

    input.addEventListener('input', () => {

        const fullVal = input.value;

        const parts = fullVal.split(',');

        const lastPart =
            parts[parts.length - 1].trim().toLowerCase();

        if (lastPart.length === 0) {
            suggestionBox.style.display = "none";
            return;
        }

        if (lastPart.length === 1 && shortcutMap[lastPart]) {

            suggestionBox.innerHTML = "";

            suggestionBox.style.display = "block";

            shortcutMap[lastPart].forEach(item => {

                const div = document.createElement("div");

                div.className = "custom-autocomplete-item";

                div.textContent = item;

                div.onclick = (e) => {

                    e.preventDefault();

                    const prefix =
                        parts.slice(0, -1).join(',');

                    input.value =
                        prefix ? `${prefix}, ${item}` : item;

                    suggestionBox.style.display = "none";

                    input.focus();
                };

                suggestionBox.appendChild(div);
            });

        } else {

            suggestionBox.style.display = "none";
        }
    });

    document.addEventListener("click", (e) => {

        if (e.target !== input) {
            suggestionBox.style.display = "none";
        }
    });
};

            id: doc.id,

}

// ================= FORMAT TANGGAL =================
function formatTanggalIndonesia(dateStr) {

    if (!dateStr) return "";

    const dateObj = new Date(dateStr);

    return new Intl.DateTimeFormat("id-ID", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
    }).format(dateObj);
}
