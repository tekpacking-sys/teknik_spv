<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Laporan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: aliceblue; display: flex; justify-content: center; align-items: center; height: 100vh; }
    
    .form-container {
        width: 96%;
        max-width: 500px;
        height: 80vh;
        background-color: #ffffff;
        border: 1px solid #0003;
        border-radius: 10px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    
    .header {
        background: #00796B;
        color: white;
        height: 70px;
        justify-content: center;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        padding: 0 15px;
        position: relative;
        font-size: 18px;
        font-weight: bold;
    }
    
    #btnBack { 
        background: none; 
        border: none; 
        color: white; 
        font-size: 28px; 
        cursor: pointer; 
        position: absolute;
        left: 15px;
        top: 50%; 
        transform: translateY(-50%);
        z-index: 10;
        display: none;
    }
    
    .menu-laporan {
        padding: 20px;
        display: flex;
        flex-direction: column; 
        gap: 20px;
    }    
    .menu-laporan button {
        border: 1px solid #ccc;
        background-color: #fff;
        padding: 15px;
        cursor: pointer;
        box-shadow: rgba(0, 0, 0, 0.16) 0px 3px 6px, rgba(0, 0, 0, 0.23) 0px 3px 6px;
    }  
    
    /*--- Form Induk--*/
    .form-body {
        display: block;
        flex: 1 1 auto; 
        padding: 15px; 
        overflow-y: auto;
        min-height: 0;
    }
    
    /*--- Form Laporan harian--*/
    .judul-input{
        background-color: #368BC1;
        border-radius: 3px;
        color: white;
        padding: 10px;
        display:flex;
        font-weight:bold;
        margin-bottom:10px;
    }
    
    .judul-input span:nth-child(1){
        width:130px;
    }
    
    .judul-input span:nth-child(2),
    .judul-input span:nth-child(3){
        flex:1;
        text-align:center;
    }
    
    .form-row{
        display:flex;
        align-items:center;
        gap:5px;
    }
    
    .machine-name{
        width:130px;
        margin-bottom:0;
    }
    
    .machine-name label{
        margin:0;
        font-weight:bold;
    }
    
    .input-box{
        flex:1;
        margin-bottom:0;
    }
    
    /*--- Form Maintenace--*/
    .form-group { margin-bottom: 10px; }
    .form-group label { display: block; margin-bottom: 3px; font-weight: 600; }
    .form-group input,
    .form-group select,
    .form-group textarea {
        background-color: #fff;
        width: 100%;
        padding: 8px;
        border: 1px solid #0007;
        border-radius: 3px;
    }
    
    .form-footer { background-color: #fff; padding: 16px; border-top: 1px solid #e9ecef; flex-shrink: 0; }
    .btn-submit, .btn-main { width: 100%; background-color: #27ae60; color: white; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; }
    .sub { font-size: 18px; font-weight: bold; }
    
    /*--- Halaman Tampilkan Data ---*/
    .filter-section {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }
    .filter-section select {
        flex: 1;
        padding: 8px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }
    .table-responsive {
        width: 100%;
        overflow-x: auto;
        border: 1px solid #ddd;
        border-radius: 5px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        text-align: left;
    }
    th, td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        white-space: nowrap;
    }
    th {
        background-color: #00796B;
        color: white;
        position: sticky;
        top: 0;
    }
    tr:nth-child(even) { background-color: #f9f9f9; }
    .loading-text { text-align: center; font-weight: bold; padding: 20px; color: #666; }
  </style>
</head>
<body>

    <div class="header" id="mainHeader">

        <div class="form-row">

        <div class="form-row">

          <div class="form-group input-box">

        <div class="form-row">

    <form id="formMaintenance" style="display:none; flex-direction: column; height: 100%;">
      <div class="form-body">
        <div class="form-group"><label>Tanggal</label><input type="date" id="mtTanggal"></div>
        <div class="form-group"><label>Shift</label><select id="mtShift">
            <option value="">Pilih Shift</option>
            <option value="1">Shift 1</option>
            <option value="2">Shift 2</option>
            <option value="3">Shift 3</option>
          </select></div>
        <div class="form-group"><label>Area</label><select id="mtArea">
            <option value="">Pilih area</option>
            <option value="YUPI 1">YUPI 1</option>
            <option value="YUPI 3">YUPI 3</option>
            <option value="YUPI 4">YUPI 4</option>
            <option value="YUPI 5">YUPI 5</option>
          </select></div>
        <div class="form-group"><label>Mesin</label><input type="text" id="mtMesin"></div>
        <div class="form-group"><label>Remark</label><textarea id="mtRemark"></textarea></div>

      </div>
      <div class="form-footer">

      </div>
    </form>

    <div id="pageData" style="display:none; flex-direction: column; height: 100%; overflow: hidden; padding: 15px;">
      <div class="filter-section">
        <select id="filterJenis" onchange="loadDataFromServer()">
          <option value="produksi">Data Laporan Harian</option>
          <option value="maintenance">Data Maintenance</option>
        </select>
      </div>

      <div class="table-responsive" style="flex: 1; overflow: auto;">
        <table id="tabelLaporan">
          <thead id="tableHeader"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzmRSialsP8BbKIYbGAOCHT32N2NS0A16XR3iEUkVeFgjst6nZQkRnB6haw6wbwtvI/exec";
    const daftarSupervisor = ["Ruslan Budi", "Sutarno", "Sudirman", "Saepudin"];
    
    function showProduksi(){
        document.getElementById("formProduksi").style.display="flex";
        document.getElementById("menuLaporan").style.display="none";
        document.getElementById("btnBack").style.display="block";
        document.getElementById("headerTitle").innerHTML="Form Laporan Harian";
    }
    
    function showMaintenance(){
        document.getElementById("formMaintenance").style.display="flex";
        document.getElementById("menuLaporan").style.display="none";
        document.getElementById("btnBack").style.display="block";
        document.getElementById("headerTitle").innerHTML="Form Maintenance";
    }
    
    function showDataPage() {
        document.getElementById("pageData").style.display="flex";
        document.getElementById("menuLaporan").style.display="none";
        document.getElementById("btnBack").style.display="block";
        document.getElementById("headerTitle").innerHTML="Data Isian Laporan";
        loadDataFromServer();
    }
    
    function kembaliMenu(){
        document.getElementById("formProduksi").style.display="none";
        document.getElementById("formMaintenance").style.display="none";
        document.getElementById("pageData").style.display="none";
        document.getElementById("menuLaporan").style.display="flex";
        document.getElementById("btnBack").style.display="none";
        document.getElementById("headerTitle").innerHTML="Laporan Teknik Packing";
    }
        
    function isiSupervisor(){
        const produksi = document.getElementById("supervisor");
        const maintenance = document.getElementById("mtSupervisor");
    
        produksi.innerHTML = '<option value="">-- Pilih Supervisor --</option>';
        maintenance.innerHTML = '<option value="">-- Pilih Supervisor --</option>';
    
        daftarSupervisor.forEach(function(nama){
            produksi.innerHTML += `<option value="${nama}">${nama}</option>`;
            maintenance.innerHTML += `<option value="${nama}">${nama}</option>`;
        });
    }
    
    // AMBIL DATA DARI SERVER
    async function loadDataFromServer() {
        const jenis = document.getElementById("filterJenis").value;
        const tBody = document.getElementById("tableBody");
        const tHeader = document.getElementById("tableHeader");
        
        // Bersihkan sisa render sebelumnya
        tHeader.innerHTML = "";
        tBody.innerHTML = `<tr><td class="loading-text">Memuat data...</td></tr>`;
        
        try {
            const response = await fetch(`${WEB_APP_URL}?jenis=${jenis}`);
            const result = await response.json();
            
            if (!result.success || !result.data || result.data.length === 0) {
                tBody.innerHTML = `<tr><td class="loading-text">Tidak ada data ditemukan.</td></tr>`;
                return;
            }
            
            const rawData = result.data;
            tBody.innerHTML = ""; // Bersihkan teks loading
    
            if (jenis === "produksi") {
                // === TAMPILAN VERTIKAL UNTUK PRODUKSI ===
                const skemaProduksi = [
                    { label: "TANGGAL", indexCol: 4, type: "meta" },
                    { label: "SHIFT", indexCol: 5, type: "meta" },
                    { label: "SUPERVISOR", indexCol: 2, type: "meta" },
                    { label: "STARCHLESS", key: "starchless", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdStarchless", type: "breakdown" },
                    { label: "HASSIA", key: "hassia", type: "mesin" },
                    { label: "KAWASHIMA Y3", key: "kawashima", type: "mesin" },
                    { label: "MULTIPOND", key: "multipond", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdMultipond", type: "breakdown" },
                    { label: "PP Y3", key: "pp", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdPP", type: "breakdown" },
                    { label: "CRUNCHY", key: "crunchy", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdCrunchy", type: "breakdown" },
                    { label: "ANIMAL", key: "animal", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdAnimal", type: "breakdown" },
                    { label: "ZUGI", key: "zugi", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdZugi", type: "breakdown" },
                    { label: "DIPPY", key: "dippy", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdDippy", type: "breakdown" },
                    { label: "ANIMAL L2", key: "animal2", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdAnimal2", type: "breakdown" },
                    { label: "NOODLE", key: "noodle", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdNoodle", type: "breakdown" },
                    { label: "BERRYBONZ", key: "berrybonz", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdBerrybonz", type: "breakdown" },
                    { label: "G. FRIES Y4", key: "fries", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdFries", type: "breakdown" },
                    { label: "MB Y4", key: "mb", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdMB", type: "breakdown" },
                    { label: "MY WATCH", key: "mywatch", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdMyWatch", type: "breakdown" },
                    { label: "ISHIDA Y5", key: "ishida", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdIshida", type: "breakdown" },
                    { label: "CUP SEALER", key: "cupsealer", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdCupSealer", type: "breakdown" },
                    { label: "ROLLETE", key: "rollete", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdRollete", type: "breakdown" },
                    { label: "PP Y5", key: "pp5", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdPP5", type: "breakdown" },
                    { label: "MB Y5", key: "mb5", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdMB5", type: "breakdown" },
                    { label: "MB 35 GR", key: "mb35", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdMB35", type: "breakdown" },
                    { label: "MB MAX", key: "max", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdMax", type: "breakdown" },
                    { label: "G. FRIES Y5", key: "gfries", type: "mesin" },
                    { label: "BREAKDOWN", key: "bdGFries", type: "breakdown" }
                ];
    
                skemaProduksi.forEach(item => {
                    const tr = document.createElement("tr");
                    const th = document.createElement("th");
                    th.innerText = item.label;
                    th.style.backgroundColor = "#00796B";
                    th.style.color = "white";
                    th.style.width = "90px";
                    th.style.position = "sticky";
                    th.style.left = "0";
                    th.style.zIndex = "2";
                    tr.appendChild(th);
    
                    rawData.forEach(row => {
                        const td = document.createElement("td");
                        td.style.border = "1px solid #0007";
                        td.style.padding = "10px";
                        
          td.style.textAlign = "center";             
                        if (item.type === "meta") {
                            let nilaiMeta = row[item.indexCol] !== undefined ? String(row[item.indexCol]) : "-";
                            if (item.label === "TANGGAL" && nilaiMeta.includes("/")) {
                                let tanggalJam = nilaiMeta.split(" ");
                                let bagian = tanggalJam[0].split("/");
                                nilaiMeta = bagian[0] + "/" + bagian[1]; // Format tanggal 21/06
                            }
                            td.innerText = nilaiMeta;
                        } else {
                            const logString = (item.type === "mesin") ? (row[6] || "-") : (row[7] || "-");
                            td.innerText = ambilNilaiDariLog(logString, item.key);
                        }
                        tr.appendChild(td);
                    });
                    tBody.appendChild(tr);
                });
    
            } else {
                // === TAMPILAN HORIZONTAL UNTUK MAINTENANCE (DIAMBIL DARI SHEET MAINTENANCE ASLI) ===
                const headers = ["NO", "TANGGAL", "SHIFT", "AREA", "MESIN", "REMARK"];
                tHeader.innerHTML = `<tr>${headers.map(h => `<th style="background-color: #00796B; color: white; padding: 10px; position: sticky; top: 0;">${h}</th>`).join("")}</tr>`;
                
                tBody.innerHTML = rawData.map(row => {
                    return `<tr>
                        <td style="border:1px solid #ddd; padding:10px; text-align:center;">${row[0] || '-'}</td>
                        <td style="border:1px solid #ddd; padding:10px; text-align:center;">${row[1] || '-'}</td>
                        <td style="border:1px solid #ddd; padding:10px; text-align:center;">${row[2] || '-'}</td>
                        <td style="border:1px solid #ddd; padding:10px;">${row[3] || '-'}</td>
                        <td style="border:1px solid #ddd; padding:10px;">${row[4] || '-'}</td>
                        <td style="border:1px solid #ddd; padding:10px;">${row[5] || '-'}</td>
                    </tr>`;
                }).join("");
            }
            
        } catch (err) {
            console.error(err);
            tBody.innerHTML = `<tr><td class="loading-text" style="color:red;">Gagal mengambil data dari server</td></tr>`;
        }
    }
    
    // Fungsi pembantu untuk memproses teks log "starchless:10, multipond:5"
    function ambilNilaiDariLog(logString, key) {
        if (!logString || logString === "-") return "-";
        const pasangan = logString.split(", ");
        for (let i = 0; i < pasangan.length; i++) {
            const part = pasangan[i].split(":");
            if (part[0].trim() === key) {
                return part[1] ? part[1].trim() : "-";
            }
        }
        return "-";
    }
